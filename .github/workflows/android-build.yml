name: Build & Deploy BeatDrop

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write   # needed to publish a GitHub Release

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew permission
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Build debug APK (always; no secrets needed) ─────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── Re-sign debug APK with v1+v2 for max device compatibility ──────────
      # Some Android 12/13 OEM skins (Samsung, Xiaomi) require JAR signing (v1)
      # in addition to APK Signature Scheme v2. The default debug build only
      # uses v2. This step creates a keystore if needed, then re-signs.
      - name: Re-sign debug APK (v1+v2+v3)
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK" ]; then echo "No debug APK found"; exit 0; fi

          # Create a debug keystore if it doesn't exist
          DEBUG_KS="$HOME/.android/debug.keystore"
          mkdir -p "$HOME/.android"
          if [ ! -f "$DEBUG_KS" ]; then
            keytool -genkeypair -v \
              -keystore "$DEBUG_KS" \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "Created debug keystore"
          fi

          # Find apksigner
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" -type f | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then echo "apksigner not found"; exit 0; fi

          # Find zipalign
          ZIPALIGN=$(find "$ANDROID_HOME/build-tools" -name "zipalign" -type f | sort -V | tail -1)

          # Zipalign first (required before signing)
          if [ -n "$ZIPALIGN" ]; then
            cp "$APK" "${APK}.unsigned"
            $ZIPALIGN -f 4 "${APK}.unsigned" "$APK"
            rm "${APK}.unsigned"
            echo "Zipaligned"
          fi

          # Re-sign with v1+v2+v3
          $APKSIGNER sign \
            --ks "$DEBUG_KS" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            "$APK"

          echo "=== APK re-signed with v1+v2+v3 ==="
          $APKSIGNER verify -v --print-certs "$APK"

      # ── Build signed release APK if keystore secrets are present ─────────────
      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build release APK (signed)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      # ── Collect APKs into one folder ────────────────────────────────────────
      - name: Gather APKs
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/*.apk dist/ 2>/dev/null || true
          cp app/build/outputs/apk/release/*.apk dist/ 2>/dev/null || true
          ls -la dist

      # ── Upload as workflow artifact (download from the run page) ─────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeatDrop-apk
          path: dist/*.apk
          if-no-files-found: error

      # ── Deploy: publish APKs to a GitHub Release ────────────────────────────
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: BeatDrop build ${{ github.run_number }}
          body: |
            Automated build from commit ${{ github.sha }}.
            Install the APK on Android (allow "install from unknown sources").
          files: dist/*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
