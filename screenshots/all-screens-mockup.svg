  <text x="928" y="274" text-anchor="middle" fill="#444" font-size="12">♫</text>
  <text x="954" y="274" fill="white" font-size="9">Shape of You</text>
  
  <rect x="1022" y="252" width="108" height="36" rx="8" fill="#111"/>
  <rect x="1022" y="252" width="36" height="36" rx="8" fill="#1A1A1A"/>
  <text x="1040" y="274" text-anchor="middle" fill="#444" font-size="12">♫</text>
  <text x="1066" y="274" fill="white" font-size="9">Blinding Lights</text>
  
  <rect x="910" y="292" width="108" height="36" rx="8" fill="#111"/>
  <rect x="910" y="292" width="36" height="36" rx="8" fill="#1A1A1A"/>
  <text x="928" y="314" text-anchor="middle" fill="#444" font-size="12">♫</text>
