  <rect x="1022" y="292" width="108" height="36" rx="8" fill="#111"/>
  <rect x="1022" y="292" width="36" height="36" rx="8" fill="#1A1A1A"/>
  <text x="1040" y="314" text-anchor="middle" fill="#444" font-size="12">♫</text>
