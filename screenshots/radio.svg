<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="400" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    <linearGradient id="shuffle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C77DFF"/>
      <stop offset="100%" style="stop-color:#7B2CBF"/>
    </linearGradient>
    <linearGradient id="heavy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#EF476F"/>
    </linearGradient>
    <linearGradient id="fresh" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4"/>
      <stop offset="100%" style="stop-color:#1B9AAA"/>
    </linearGradient>
    <linearGradient id="deep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE66D"/>
      <stop offset="100%" style="stop-color:#FF9F1C"/>
    </linearGradient>
    <linearGradient id="az" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06D6A0"/>
      <stop offset="100%" style="stop-color:#118AB2"/>
    </linearGradient>
    <linearGradient id="time" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8E8E93"/>
      <stop offset="100%" style="stop-color:#3A3A3C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="400" height="800" fill="url(#bg)"/>

  <!-- Header -->
  <text x="24" y="70" fill="#FFFFFF" font-size="32" font-weight="900" font-family="Arial, sans-serif">Radio</text>

  <!-- Grid of station cards -->
  <!-- Row 1 -->
  <rect x="24" y="100" width="172" height="172" rx="16" fill="url(#shuffle)"/>
  <text x="36" y="130" fill="#FFFFFFCC" font-size="10" font-weight="bold" font-family="Arial">📻</text>
  <text x="36" y="240" fill="#FFFFFF" font-size="18" font-weight="900" font-family="Arial">Shuffle All</text>
  <text x="36" y="260" fill="#FFFFFFCC" font-size="12" font-family="Arial">Everything, randomized</text>

  <rect x="204" y="100" width="172" height="172" rx="16" fill="url(#heavy)"/>
  <text x="216" y="130" fill="#FFFFFFCC" font-size="10" font-weight="bold" font-family="Arial">📻</text>
  <text x="216" y="240" fill="#FFFFFF" font-size="18" font-weight="900" font-family="Arial">Heavy Rotation</text>
  <text x="216" y="260" fill="#FFFFFFCC" font-size="12" font-family="Arial">Your most played</text>

  <!-- Row 2 -->
  <rect x="24" y="290" width="172" height="172" rx="16" fill="url(#fresh)"/>
  <text x="36" y="320" fill="#FFFFFFCC" font-size="10" font-weight="bold" font-family="Arial">📻</text>
  <text x="36" y="430" fill="#FFFFFF" font-size="18" font-weight="900" font-family="Arial">Fresh Finds</text>
  <text x="36" y="450" fill="#FFFFFFCC" font-size="12" font-family="Arial">Recently added</text>

  <rect x="204" y="290" width="172" height="172" rx="16" fill="url(#deep)"/>
  <text x="216" y="320" fill="#FFFFFFCC" font-size="10" font-weight="bold" font-family="Arial">📻</text>
  <text x="216" y="430" fill="#FFFFFF" font-size="18" font-weight="900" font-family="Arial">Deep Cuts</text>
  <text x="216" y="450" fill="#FFFFFFCC" font-size="12" font-family="Arial">Rarely played</text>

  <!-- Row 3 -->
  <rect x="24" y="480" width="172" height="172" rx="16" fill="url(#az)"/>
  <text x="36" y="510" fill="#FFFFFFCC" font-size="10" font-weight="bold" font-family="Arial">📻</text>
  <text x="36" y="620" fill="#FFFFFF" font-size="18" font-weight="900" font-family="Arial">A–Z Journey</text>
  <text x="36" y="640" fill="#FFFFFFCC" font-size="12" font-family="Arial">Alphabetical ride</text>

  <rect x="204" y="480" width="172" height="172" rx="16" fill="url(#time)"/>
  <text x="216" y="510" fill="#FFFFFFCC" font-size="10" font-weight="bold" font-family="Arial">📻</text>
  <text x="216" y="620" fill="#FFFFFF" font-size="18" font-weight="900" font-family="Arial">Time Machine</text>
  <text x="216" y="640" fill="#FFFFFFCC" font-size="12" font-family="Arial">Oldest first</text>

  <!-- Label -->
  <text x="200" y="720" fill="#666" font-size="14" text-anchor="middle" font-family="Arial">📻 Radio Screen — Fixed</text>
  <text x="200" y="750" fill="#444" font-size="12" text-anchor="middle" font-family="Arial">Gradient cards, no overlap, dark theme</text>
</svg>